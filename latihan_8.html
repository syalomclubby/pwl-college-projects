<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
</head>
<body>
    <h2>Cek Genap / Ganjil</h2>

    <input type="number" id="angka" placeholder="Masukkan angka">
    <button onclick="cekAngka()">Cek</button>

    <p id="hasil"></p>

    <script>
        function cekAngka() {
            let angka = document.getElementById("angka").value;

            if (angka % 2 == 0) {
                document.getElementById("hasil").innerHTML = "Bilangan Genap";
            } else {
                document.getElementById("hasil").innerHTML = "Bilangan Ganjil";
            }
        }
    </script>
</body>
</html>
