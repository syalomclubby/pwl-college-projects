<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jadwal - Pemrograman Web Dasar</title>
    <style>
      :root {
        --bg: #f6fafc;
        --card: #ffffff;
        --text: #072033;
        --muted: #6b7280;
        --accent: #0b3048;
        --border: #e7edf3;
        --break: #fbf6f1;
        --radius: 10px;
      }
      * {
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        margin: 0;
        font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px;
      }
      .card {
        width: 100%;
        max-width: 950px;
        background: var(--card);
        border-radius: var(--radius);
        padding: 38px;
        border: 1px solid var(--border);
        box-shadow: 0 8px 20px rgba(7, 20, 34, 0.04);
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }
      .desc {
        margin: 6px 0 16px;
        color: var(--muted);
        font-size: 13px;
      }
      .table-wrap {
        overflow-x: auto;
        border-radius: 6px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
      }
      thead th {
        background: #f1f5f9;
        color: var(--text);
        padding: 10px 12px;
        text-align: center;
        font-weight: 700;
        border-bottom: 1px solid var(--border);
      }
      thead th:first-child {
        background: #f8fafc;
        font-weight: 800;
        color: var(--accent);
      }
      td {
        padding: 12px 12px;
        border-bottom: 1px solid var(--border);
        text-align: center;
        font-size: 14px;
        vertical-align: middle;
      }
      td.shift {
        width: 68px;
        font-weight: 700;
        color: var(--accent);
        background: #fbfdff;
      }
      .break-row td {
        background: #f8f8f8;
        text-transform: uppercase;
        font-weight: 700;
        color: #6b6b6b;
        padding: 10px;
        letter-spacing: 0.6px;
      }
      td:empty::before {
        content: "—";
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div>
          <h1>Jadwal - Pemrograman Web Dasar</h1>
          <div class="desc">
            Daftar Jadwal Perkuliah PWL Kelas SA (Pagi) selama 1 minggu
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Shift/Hari</th>
                <th>Senin</th>
                <th>Selasa</th>
                <th>Rabu</th>
                <th>Kamis</th>
                <th>Jumat</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="shift">1</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
              </tr>

              <tr class="break-row">
                <td colspan="6">kosong / break</td>
              </tr>

              <tr>
                <td class="shift">2</td>
                <td>Transformasi Digital</td>
                <td>Pemrograman Web Dasar</td>
                <td></td>
                <td></td>
                <td>Ibadah</td>
              </tr>

              <tr class="break-row">
                <td colspan="6">kosong / break</td>
              </tr>

              <tr>
                <td class="shift">3</td>
                <td></td>
                <td></td>
                <td>Sistem Basis Data</td>
                <td>Matematika Diskrit</td>
                <td>Pengantar Manajemen</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
