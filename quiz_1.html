<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        h2 {
            color: #99eeee;
            font-size: 36px;
        }

        img {
            width: 300px;
            height: 300px;
            border: 2px dotted #000;
            border-radius: 10px;
        }

        ul {
            color: blue;
            list-style-type: none;
        }

        table {
            border: 2px solid #000;
        }

        th, td {
            padding-top: 5px;
        }

        form.search-facebook {
            margin-top: 20px;
            display: flex;
            align-items: center;
            width: 200px;
            height: 40px;
            border-radius: 20px;
            padding: 0 14px;
            color: gray;
            background-color: rgb(240, 240, 240);
        }

        .search-facebook input {
            background-color: transparent;
            border: transparent;
        }

        .search-facebook input:focus {
            outline: none;
        }

        .search-facebook i {
            padding-right: 8px;
        }
    </style>
</head>
<body>
    <!-- latihan 1 -->
    <p style="color: #fff; background-color: #000;">Halo Dunia!</p>

    <!-- latihan 2 -->
    <h2>Ini Judul</h2>

    <!-- latihan 3 -->
    <img src="images/pertemuan_5/chicken.png" alt="">
    
    <!-- latihan 4 -->
    <ul>
        <li>Ayam</li>
        <li>Ikan</li>
        <li>Sapi</li>
        <li>Domba</li>
    </ul>
    
    <!-- latihan 7 -->
    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr>
            <td>Peter</td>
            <td>Griffin</td>
        </tr>
        <tr>
            <td>Lois</td>
            <td>Griffin</td>
        </tr>
    </table>

    <!-- latihan 9 -->
    <form class="search-facebook" action="">
        <i class="fas fa-search"></i>
        <input placeholder="Search Facebook"></input>
    </form>
</body>
</html>
